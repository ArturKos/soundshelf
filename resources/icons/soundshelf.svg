<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1e1e2e"/>
            <stop offset="100%" stop-color="#11111b"/>
        </linearGradient>
        <linearGradient id="bar" x1="0" y1="1" x2="0" y2="0">
            <stop offset="0%" stop-color="#89b4fa"/>
            <stop offset="60%" stop-color="#cba6f7"/>
            <stop offset="100%" stop-color="#f5c2e7"/>
        </linearGradient>
    </defs>

    <!-- Rounded square background -->
    <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)" stroke="#313244" stroke-width="2"/>

    <!-- Spectrum bars (Winamp-style) -->
    <g transform="translate(20, 40)">
        <rect x="0"  y="30" width="8" height="34" fill="url(#bar)" rx="1"/>
        <rect x="12" y="20" width="8" height="44" fill="url(#bar)" rx="1"/>
        <rect x="24" y="10" width="8" height="54" fill="url(#bar)" rx="1"/>
        <rect x="36" y="0"  width="8" height="64" fill="url(#bar)" rx="1"/>
        <rect x="48" y="14" width="8" height="50" fill="url(#bar)" rx="1"/>
        <rect x="60" y="24" width="8" height="40" fill="url(#bar)" rx="1"/>
        <rect x="72" y="36" width="8" height="28" fill="url(#bar)" rx="1"/>
        <rect x="84" y="46" width="8" height="18" fill="url(#bar)" rx="1"/>
    </g>

    <!-- Baseline -->
    <line x1="20" y1="106" x2="108" y2="106" stroke="#45475a" stroke-width="2" stroke-linecap="round"/>

    <!-- "Disc" hint — small circle in corner -->
    <circle cx="100" cy="28" r="10" fill="none" stroke="#f5e0dc" stroke-width="2"/>
    <circle cx="100" cy="28" r="3" fill="#f5e0dc"/>
</svg>
