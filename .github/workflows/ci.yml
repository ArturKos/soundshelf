name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  linux:
    name: Linux (Ubuntu)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config \
            qt6-base-dev qt6-base-dev-tools \
            qt6-tools-dev qt6-tools-dev-tools \
            qt6-multimedia-dev qt6-svg-dev qt6-httpserver-dev \
            libmpv-dev libtag1-dev libsqlite3-dev \
            libcdio-dev libcdio-paranoia-dev libdiscid-dev \
            libchromaprint-dev libebur128-dev libfftw3-dev \
            ffmpeg

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOUNDSHELF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: soundshelf-linux-x86_64
          path: |
            build/soundshelf
            build/soundshelf-cli
          retention-days: 14

  windows-msys2:
    name: Windows (MSYS2 MinGW64)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4

      - name: Set up MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            git
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-qt6-base
            mingw-w64-x86_64-qt6-tools
            mingw-w64-x86_64-qt6-multimedia
            mingw-w64-x86_64-qt6-svg
            mingw-w64-x86_64-qt6-httpserver
            mingw-w64-x86_64-mpv
            mingw-w64-x86_64-taglib
            mingw-w64-x86_64-sqlite3
            mingw-w64-x86_64-libcdio-paranoia
            mingw-w64-x86_64-libdiscid
            mingw-w64-x86_64-chromaprint
            mingw-w64-x86_64-libebur128
            mingw-w64-x86_64-fftw

      - name: Patch upstream .pc files
        run: |
          for f in /mingw64/lib/pkgconfig/isl.pc \
                   /mingw64/lib/pkgconfig/mujs.pc \
                   /mingw64/lib/pkgconfig/tre.pc; do
              if [ -f "$f" ]; then
                  sed -i 's|-I/mingw64/include\b|-I${includedir}|g' "$f"
              fi
          done

      - name: Configure
        run: |
          cmake -G Ninja -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DSOUNDSHELF_BUILD_TESTS=ON

      - name: Build
        run: cmake --build build -j

      - name: Test
        env:
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build --output-on-failure

      - name: Deploy bundle
        run: bash scripts/windows-deploy.sh dist/soundshelf-win64

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: soundshelf-windows-msys2-bundle
          path: dist/soundshelf-win64/
          retention-days: 14

  windows-vcpkg:
    name: Windows (MSVC + vcpkg)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows-static-md
      MPV_DEV_URL: "https://sourceforge.net/projects/mpv-player-windows/files/libmpv/mpv-dev-x86_64-v3-20260419-git-06f4ce7.7z/download"

    steps:
      - uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.*'
          arch: win64_msvc2019_64
          modules: qthttpserver qtmultimedia qtsvg

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: ${{ github.workspace }}/vcpkg
          vcpkgGitCommitId: 495848814af4cc2760e70f7440c2dbe66d3ff196

      - name: Download mpv-dev SDK
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path external -Force | Out-Null
          $archive = "external\mpv-dev.7z"
          curl.exe -L -o $archive $env:MPV_DEV_URL
          7z x $archive -o"external\mpv-dev" -y
          # Create MSVC import lib from .def
          $def = Get-ChildItem "external\mpv-dev" -Filter "*.def" -Recurse |
                 Select-Object -First 1
          if ($def) {
              New-Item -ItemType Directory -Path "external\mpv-dev\lib" -Force | Out-Null
              lib /def:"$($def.FullName)" /out:"external\mpv-dev\lib\mpv.lib" /machine:x64
          }

      - name: Configure
        shell: pwsh
        run: |
          cmake -G Ninja -B build-vcpkg `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-windows-static-md `
            -DMPV_DIR="${{ github.workspace }}/external/mpv-dev" `
            -DSOUNDSHELF_BUILD_TESTS=ON `
            -DSOUNDSHELF_ENABLE_LIBCDIO=OFF

      - name: Build
        run: cmake --build build-vcpkg -j

      - name: Test
        shell: pwsh
        env:
          PATH: ${{ github.workspace }}/external/mpv-dev;${{ env.PATH }}
          QT_QPA_PLATFORM: offscreen
        run: ctest --test-dir build-vcpkg --output-on-failure

      - name: Deploy bundle
        shell: bash
        run: |
          bash scripts/windows-deploy-vcpkg.sh dist/soundshelf-win64-vcpkg

      - name: Upload bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: soundshelf-windows-vcpkg-bundle
          path: dist/soundshelf-win64-vcpkg/
          retention-days: 14
